<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROCMON</title>
    <script src="webui.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        
        <!-- Header Panel -->
        <header class="top-panel">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>
                <span>PROCMON</span>
            </div>
            
            <div class="gauges">
                <div class="gauge-container">
                    <div class="gauge-info">
                        <span class="label">CPU Usage</span>
                        <span class="value" id="cpu-val">0%</span>
                    </div>
                    <div class="gauge-bar"><div class="gauge-fill" id="cpu-fill" style="width:0%"></div></div>
                </div>
                <div class="gauge-container">
                    <div class="gauge-info">
                        <span class="label">Memory</span>
                        <span class="value" id="mem-val">0%</span>
                    </div>
                    <div class="gauge-bar"><div class="gauge-fill mem" id="mem-fill" style="width:0%"></div></div>
                </div>
            </div>

            <div class="sys-stats">
                <div class="stat-item"><span class="lbl">Procs</span><span class="val" id="stat-procs">-</span></div>
                <div class="stat-item"><span class="lbl">Threads</span><span class="val" id="stat-threads">-</span></div>
                <div class="stat-item"><span class="lbl">Handles</span><span class="val" id="stat-handles">-</span></div>
                <div class="stat-item"><span class="lbl">Uptime</span><span class="val" id="stat-uptime">-</span></div>
            </div>
        </header>

        <!-- Tool Bar -->
        <div class="toolbar">
            <div class="toolbar-left" style="display:flex; gap:12px;">
                <input type="text" id="search-box" placeholder="Search processes (Ctrl+F)..." oninput="applyFilter()">
                <select id="refresh-rate" onchange="changeRefreshRate()" style="background:rgba(0,0,0,0.2); border:1px solid var(--border-color); color:var(--text-main); padding:8px 12px; border-radius:6px; font-family:'Inter', sans-serif; font-size:13px; outline:none;">
                    <option value="500" style="background:var(--bg-main)">Fast (0.5s)</option>
                    <option value="1000" selected style="background:var(--bg-main)">Normal (1.0s)</option>
                    <option value="2000" style="background:var(--bg-main)">Slow (2.0s)</option>
                    <option value="5000" style="background:var(--bg-main)">Very Slow (5.0s)</option>
                </select>
            </div>
            <div class="actions">
                <button class="btn btn-danger" onclick="killSelected()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                    End Process
                </button>
            </div>
        </div>

        <!-- Table Container -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th onclick="setSort('pid')">PID <span class="sort-icon" id="sort-pid"></span></th>
                        <th onclick="setSort('name')">Name <span class="sort-icon" id="sort-name"></span></th>
                        <th onclick="setSort('cpu')">CPU % <span class="sort-icon" id="sort-cpu"></span></th>
                        <th onclick="setSort('mem')">Working Set <span class="sort-icon" id="sort-mem"></span></th>
                        <th onclick="setSort('privateMem')">Private <span class="sort-icon" id="sort-privateMem"></span></th>
                        <th onclick="setSort('handles')">Handles <span class="sort-icon" id="sort-handles"></span></th>
                        <th onclick="setSort('threads')">Threads <span class="sort-icon" id="sort-threads"></span></th>
                        <th>Priority</th>
                    </tr>
                </thead>
                <tbody id="proc-body">
                    <!-- Rows generated by JS -->
                </tbody>
            </table>
        </div>

    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu">
        <div class="menu-header" id="ctx-header">PID 0 - Example</div>
        <div class="menu-sep"></div>
        <div class="menu-item danger" onclick="ctxKill()">End Process</div>
        <div class="menu-sep"></div>
        <div class="menu-item" onclick="ctxSetPriority(256)">Set Realtime</div>
        <div class="menu-item" onclick="ctxSetPriority(128)">Set High</div>
        <div class="menu-item" onclick="ctxSetPriority(32768)">Set Above Normal</div>
        <div class="menu-item" onclick="ctxSetPriority(32)">Set Normal</div>
        <div class="menu-item" onclick="ctxSetPriority(16384)">Set Below Normal</div>
        <div class="menu-item" onclick="ctxSetPriority(64)">Set Idle</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
